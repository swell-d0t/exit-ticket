# netlify.toml
# ─────────────────────────────────────────────────────────
# Tells Netlify how to serve this app.
# No build step needed — it's plain HTML/CSS/JS.
# The edge function injects Supabase credentials at request
# time so they never need to be in the GitHub repo.
# ─────────────────────────────────────────────────────────

[build]
  publish = "."

# Register the config edge function
[[edge_functions]]
  path = "/config.js"
  function = "config"

# Redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
