# netlify.toml
[build]
  publish = "."
  command = "echo \"const SUPABASE_URL = '$SUPABASE_URL'; const SUPABASE_ANON_KEY = '$SUPABASE_ANON_KEY'; function getConfig() { return { url: SUPABASE_URL, key: SUPABASE_ANON_KEY }; } function saveConfig() {}\" > config.js"
 
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
 
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
